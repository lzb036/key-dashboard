<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="titlebar">
    <div class="titlebar-brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="titlebar-title">Key Dashboard</span>
    </div>
  </header>

  <main class="shell">
    <section class="hero-grid hero-grid--compact" aria-label="核心面板">
      <article class="panel hero-panel hero-panel--minimal interactive-panel reveal" aria-labelledby="balanceTitle">
        <span class="panel-chip">Available Credit</span>
        <div class="credit-stage">
          <div class="credit-primary">
            <div class="credit-copy">
              <span id="balanceTitle" class="metric-label">当前余额</span>
              <div id="balanceAmount" class="balance-amount empty">暂无数据</div>
            </div>
            <div class="credit-ring" aria-hidden="true">
              <span class="credit-ring-core"></span>
            </div>
          </div>

          <div class="credit-secondary-grid" aria-label="额度概览">
            <div class="credit-stat credit-stat--consumed">
              <span class="credit-stat-label">今日消费</span>
              <strong id="totalConsumedAmount" class="credit-stat-value">—</strong>
            </div>

            <div class="credit-stat credit-stat--recharged">
              <span class="credit-stat-label">总额度</span>
              <strong id="totalRechargedAmount" class="credit-stat-value">—</strong>
            </div>
          </div>
        </div>
      </article>

      <aside class="panel control-panel control-panel--minimal interactive-panel reveal" aria-labelledby="controlTitle">
        <div class="panel-heading panel-heading--minimal">
          <span class="panel-chip">API Key</span>
          <h2 id="controlTitle" class="panel-title panel-title--compact">输入后刷新</h2>
        </div>

        <div class="input-shell">
          <span class="input-icon" aria-hidden="true"></span>
          <input id="keyInput" type="password" placeholder="输入 sk-... 或 Bearer ..." autocomplete="off" spellcheck="false" aria-describedby="msg">
          <button id="toggleBtn" class="toggle-btn" type="button" aria-pressed="false" aria-label="显示 API Key">显示</button>
        </div>

        <button id="refreshBtn" class="refresh-btn" type="button">
          <span class="btn-loader" aria-hidden="true"></span>
          <span class="btn-label">刷新数据</span>
        </button>

        <div class="message-row">
          <div id="msg" class="msg" role="status" aria-live="polite"></div>
        </div>
      </aside>
    </section>

    <section class="panel table-panel reveal" aria-labelledby="tableTitle">
      <div class="table-top table-top--minimal">
        <span class="panel-chip">Ledger</span>
        <h2 id="tableTitle" class="table-title table-title--compact">消费记录</h2>
      </div>

      <div class="table-grid table-grid--head" role="row">
        <span role="columnheader">时间</span>
        <span role="columnheader">模型</span>
        <span role="columnheader">请求数</span>
        <span role="columnheader">消费</span>
      </div>

      <div id="tableBody" class="table-body" role="rowgroup">
        <div class="empty-state">
          <div class="empty-orb" aria-hidden="true"></div>
          <p class="empty-title">输入 API Key 后点击刷新</p>
          <p class="empty-text">同步成功后，这里会展示最近 10 条消费记录、模型名称和单条消费金额，让你快速判断最近的调用节奏。</p>
        </div>
      </div>

      <div id="tablePagination" class="table-pagination" hidden>
        <div id="paginationMeta" class="pagination-meta" aria-live="polite"></div>
        <div class="pagination-actions">
          <button id="prevPageBtn" class="page-btn" type="button">上一页</button>
          <button id="nextPageBtn" class="page-btn" type="button">下一页</button>
        </div>
      </div>
    </section>

    <div id="srAnnounce" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
